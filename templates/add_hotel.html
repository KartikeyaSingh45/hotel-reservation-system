{% extends "base.html" %}
{% block title %}Add Hotel{% endblock %}
{% block content %}
<div class="form-container">
    <h2>Add New Hotel</h2>
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Hotel Name</label>
            <input type="text" name="hotel_name" class="form-input" placeholder="e.g. The Grand Palace" required>
        </div>
        <div class="form-group">
            <label class="form-label">Location</label>
            <input type="text" name="location" class="form-input" placeholder="e.g. Shimla, Himachal Pradesh" required>
        </div>
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-textarea" placeholder="Brief description of the hotel..."></textarea>
        </div>
        <button type="submit" class="btn btn-accent btn-block btn-lg">Add Hotel</button>
    </form>
</div>
{% endblock %}
