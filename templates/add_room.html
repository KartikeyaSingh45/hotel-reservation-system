{% extends "base.html" %}
{% block title %}Add Room{% endblock %}
{% block content %}
<div class="form-container">
    <h2>Add New Room</h2>
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Room Type</label>
            <input type="text" name="room_type" class="form-input" placeholder="e.g. Single, Double, Suite" required>
        </div>
        <div class="form-group">
            <label class="form-label">Price per Night (₹)</label>
            <input type="number" name="price" class="form-input" placeholder="e.g. 2500" required>
        </div>
        <div class="form-group">
            <label class="form-label">Hotel</label>
            <select name="hotel_id" class="form-select" required>
                <option value="">Select a hotel</option>
                {% for hotel in hotels %}
                    <option value="{{ hotel.hotel_id }}">{{ hotel.hotel_name }} — {{ hotel.location }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-accent btn-block btn-lg">Add Room</button>
    </form>
</div>
{% endblock %}
